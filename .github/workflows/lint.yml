name: Linting & Code Quality

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install black flake8 mypy isort

            - name: Check formatting with black
              run: |
                  black --check zero_trust/ api/ tests/ example_zero_trust.py

            - name: Check import ordering with isort
              run: |
                  isort --check-only zero_trust/ api/ tests/ example_zero_trust.py

            - name: Lint with flake8
              run: |
                  flake8 zero_trust/ api/ tests/ example_zero_trust.py --count --select=E9,F63,F7,F82 --show-source --statistics
                  flake8 zero_trust/ api/ tests/ example_zero_trust.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

            - name: Type check with mypy
              run: |
                  mypy zero_trust/ api/ --ignore-missing-imports
              continue-on-error: true
