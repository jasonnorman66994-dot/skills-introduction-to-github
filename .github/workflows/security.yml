name: Security Scan

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        # Run security scan daily at 2 AM UTC
        - cron: "0 2 * * *"

jobs:
    security:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install bandit

            - name: Run Bandit security check
              run: |
                  bandit -r zero_trust/ api/ -f json -o bandit-report.json || true
                  bandit -r zero_trust/ api/ -f txt

            - name: Upload security scan results
              uses: actions/upload-artifact@v3
              if: always()
              with:
                  name: security-scan-results
                  path: bandit-report.json

            - name: Report security issues
              if: failure()
              run: |
                  echo "⚠️ Security issues detected. Review bandit-report.json for details."
                  exit 0
